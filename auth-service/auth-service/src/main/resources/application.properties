server.port=${PORT:8081}
spring.application.name=auth-service

# H2 In-Memory DB
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# JWT \u2014 Render mein Environment Variable se aayega
jwt.secret=${JWT_SECRET:MyVerySecretKeyForQuantityMeasurementAppMicroservices2024}

# CORS \u2014 Frontend ka Render URL daalo (deploy ke baad update karna)
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Google OAuth2 \u2014 Render mein Environment Variables se aayenge
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}

# Eureka \u2014 auth-service ka Eureka Server URL
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.instance.non-secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

logging.level.com.quantityapp=DEBUG