server.port=${PORT:8082}
spring.application.name=quantity-service

spring.datasource.url=jdbc:h2:mem:quantitydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

jwt.secret=${JWT_SECRET:MyVerySecretKeyForQuantityMeasurementAppMicroservices2024}

app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.instance.non-secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false